            <form id="clothingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="itemName" placeholder="Kıyafet Adı (Örn: Siyah Zara Tişört)" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-zinc-600" required>

                    <option value="Üst Giyim">Üst Giyim</option>

                    <option value="Dış Giyim">Dış Giyim</option>
                    <option value="Ayakkabı">Ayakkabı</option>
                </select>

                <input type="number" id="itemShelf" placeholder="Raf Numarası (Örn: 2)" min="1" max="10" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-zinc-600" required>

                <select id="itemPosition" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-400 focus:outline-none focus:border-zinc-600" required>
                    <option value="">Dolaptaki Yönü</option>
                    <option value="Sol Taraf">Sol Taraf</option>
                    <option value="Sağ Taraf">Sağ Taraf</option>
                </select>

                <div class="md:col-span-2">
                    <label class="block text-xs text-zinc-400 mb-2 font-mono">📸 Kıyafet Fotoğrafı (Çek veya Galeriden Seç)</label>
                    <input type="file" id="itemFile" accept="image/*" class="w-full text-xs text-zinc-400 bg-zinc-950 border border-zinc-800 rounded-xl p-3 file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-zinc-200 hover:file:bg-zinc-700 cursor-pointer">
                </div>
                
                <button type="submit" class="bg-white text-zinc-950 font-bold rounded-xl text-sm p-3 hover:bg-zinc-200 transition duration-300 md:col-span-2 cursor-pointer">Buluta Güvenli Kaydet</button>
            </form>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl flex flex-col items-center">
            <h2 class="text-md font-semibold mb-4 text-zinc-300 self-start">🎲 Günün Kombini</h2>
            <button id="generateComboBtn" class="w-full sm:w-auto bg-zinc-800 border border-zinc-700 text-white text-sm px-6 py-3 rounded-xl hover:bg-zinc-700 transition cursor-pointer mb-4">
                🔀 Rastgele Kombin Yap
            </button>
            
            <div id="comboResult" class="hidden w-full max-w-sm flex flex-col items-center">
                </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-md font-semibold text-zinc-300">📦 Gardırobumuz</h2>
            <div id="wardrobeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <div id="loadingText" class="col-span-full text-center text-zinc-500 text-xs py-4 font-mono">Veriler senkronize ediliyor...</div>
            </div>
        </section>
    </main>
