<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Gardırop v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-16">

    <header class="border-b border-zinc-800 sticky top-0 bg-zinc-950/80 backdrop-blur-md z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wider uppercase text-white">AKILLI GARDIROP</h1>
        <span class="text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full font-mono border border-emerald-500/20">● Bulut Aktif</span>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8 space-y-8">
        
        <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-md font-semibold mb-4 text-zinc-300">✨ Yeni Kıyafet Ekle</h2>
            <form id="clothingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="itemName" placeholder="Kıyafet Adı (Örn: Siyah Zara Tişört)" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-zinc-600" required>
                
                <select id="itemCategory" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-400 focus:outline-none focus:border-zinc-600" required>
                    <option value="">Kategori Seçin</option>
                    <option value="Üst Giyim">Üst Giyim</option>
                    <option value="Alt Giyim">Alt Giyim</option>
                    <option value="Dış Giyim">Dış Giyim</option>
                    <option value="Ayakkabı">Ayakkabı</option>
                </select>

                <input type="number" id="itemShelf" placeholder="Raf Numarası (Örn: 2)" min="1" max="10" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-zinc-600" required>

                <select id="itemPosition" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-400 focus:outline-none focus:border-zinc-600" required>
                    <option value="">Dolaptaki Yönü</option>
                    <option value="Sol Taraf">Sol Taraf</option>
                    <option value="Sağ Taraf">Sağ Taraf</option>
                </select>

                <div class="md:col-span-2">
                    <label class="block text-xs text-zinc-400 mb-2 font-mono">📸 Kıyafet Fotoğrafı (Çek veya Galeriden Seç)</label>
                    <input type="file" id="itemFile" accept="image/*" class="w-full text-xs text-zinc-400 bg-zinc-950 border border-zinc-800 rounded-xl p-3 file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-zinc-200 hover:file:bg-zinc-700 cursor-pointer">
                </div>
                
                <button type="submit" class="bg-white text-zinc-950 font-bold rounded-xl text-sm p-3 hover:bg-zinc-200 transition duration-300 md:col-span-2 cursor-pointer">Buluta Kaydet</button>
            </form>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl flex flex-col items-center">
            <h2 class="text-md font-semibold mb-4 text-zinc-300 self-start">🎲 Günün Kombini</h2>
            <button id="generateComboBtn" class="w-full sm:w-auto bg-zinc-800 border border-zinc-700 text-white text-sm px-6 py-3 rounded-xl hover:bg-zinc-700 transition cursor-pointer mb-4">
                🔀 Rastgele Kombin Yap
            </button>
            
            <div id="comboResult" class="hidden w-full max-w-sm flex flex-col items-center">
                </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-md font-semibold text-zinc-300">📦 Gardırobumuz</h2>
            <div id="wardrobeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <div id="loadingText" class="col-span-full text-center text-zinc-500 text-xs py-4 font-mono">Veriler senkronize ediliyor...</div>
            </div>
        </section>
    </main>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA7o96OrqwYXWby-TH7EPbdoXZo_kKscA",
            authDomain: "akilli-gardirob.firebaseapp.com",
            projectId: "akilli-gardirob",
            storageBucket: "akilli-gardirob.appspot.com",
            messagingSenderId: "801290029571",
            appId: "1:801290029571:web:102b22c6423a92bca6dc36",
            measurementId: "G-GWM8N1FE3M"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const form = document.getElementById("clothingForm");
        const grid = document.getElementById("wardrobeGrid");
        const comboBtn = document.getElementById("generateComboBtn");
        const comboResult = document.getElementById("comboResult");

        let allClothes = [];
        // Fotoğraf çekilmediyse duracak şık varsayılan görsel
        const defaultImg = "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=200&auto=format&fit=crop&q=60";

        // VERİLERİ CANLI ÇEKME
        db.collection("clothes").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            grid.innerHTML = "";
            allClothes = [];
            
            if (snapshot.empty) {
                grid.innerHTML = `<div class="col-span-full text-center text-zinc-600 text-xs py-8">Gardırop boş kanka.</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const item = doc.data();
                const id = doc.id;
                allClothes.push(item);

                const card = document.createElement("div");
                card.className = "bg-zinc-900 border border-zinc-800 rounded-xl p-3 flex flex-col justify-between shadow-md";
                card.innerHTML = `
                    <div class="space-y-2">
                        <img src="${item.image || defaultImg}" class="w-full h-28 object-cover rounded-lg bg-zinc-950 border border-zinc-800">
                        <div class="flex gap-1">
                            <span class="text-[8px] font-mono bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded">${item.category}</span>
                            <span class="text-[8px] font-mono bg-zinc-950 text-amber-400 border border-zinc-800 px-1.5 py-0.5 rounded">Raf ${item.shelf}</span>
                        </div>
                        <h3 class="text-xs font-medium text-white truncate">${item.name}</h3>
                    </div>
                    <button onclick="deleteItem('${id}')" class="mt-3 text-[10px] text-zinc-500 hover:text-red-400 text-left cursor-pointer">🗑️ Sil</button>
                `;
                grid.appendChild(card);
            });
        });

        // FOTOĞRAFI BASE64 FORMATINA ÇEVİRİP BULUTA ATMA FONKSİYONU
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("itemName").value;
            const category = document.getElementById("itemCategory").value;
            const shelf = document.getElementById("itemShelf").value;
            const position = document.getElementById("itemPosition").value;
            const fileInput = document.getElementById("itemFile");

            let imageData = defaultImg;

            // Eğer kullanıcı bir fotoğraf seçtiyse veya çektiyse onu oku
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                
                // Resmi Firebase için optimize edip metne çeviren sihirli okuyucu
                const convertToBase64 = (file) => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
                
                try {
                    imageData = await convertToBase64(file);
                } catch (error) {
                    console.error("Fotoğraf dönüştürme hatası:", error);
                }
            }

            try {
                await db.collection("clothes").add({
                    name: name,
                    category: category,
                    shelf: shelf,
                    position: position,
                    image: imageData,
                    createdAt: new Date().getTime()
                });
                form.reset();
            } catch (error) {
                alert("Kayıt hatası kanka!");
            }
        });

        // SİLME
        window.deleteItem = async (id) => {
            if(confirm("Silinsin mi kanka?")) {
                await db.collection("clothes").doc(id).delete();
            }
        };

        // KOMBİN YAPICI (TAM İSTEDİĞİN GİBİ ÜST ÜSTE, MİNİK VE YAN YANA YAZILI)
        comboBtn.addEventListener("click", () => {
            if (allClothes.length === 0) return alert("Gardırop boş!");

            const ustler = allClothes.filter(c => c.category === "Üst Giyim");
            const altlar = allClothes.filter(c => c.category === "Alt Giyim");

            if (ustler.length === 0 || altlar.length === 0) {
                return alert("Kombin için en az 1 Üst ve 1 Alt Giyim lazım kanka!");
            }

            const secilenUst = ustler[Math.floor(Math.random() * ustler.length)];
            const secilenAlt = altlar[Math.floor(Math.random() * altlar.length)];

            // Üst üste sıfır boşlukla yapışan tertemiz kutular, minik yazılar yan tarafta
            comboResult.innerHTML = `
                <div class="w-full flex flex-col">
                    <div class="w-full flex items-center bg-zinc-900 border border-zinc-800 rounded-t-xl p-2">
                        <img src="${secilenUst.image || defaultImg}" class="w-12 h-12 object-cover rounded-md bg-zinc-950 border border-zinc-800 flex-shrink-0">
                        <div class="ml-3 flex flex-col justify-center leading-tight">
                            <span class="text-[11px] font-bold text-white">${secilenUst.name}</span>
                            <span class="text-[9px] text-zinc-500 font-mono">Konum: Raf ${secilenUst.shelf} (${secilenUst.position})</span>
                        </div>
                    </div>

                    <div class="w-full flex items-center bg-zinc-900 border-x border-b border-zinc-800 rounded-b-xl p-2">
                        <img src="${secilenAlt.image || defaultImg}" class="w-12 h-12 object-cover rounded-md bg-zinc-950 border border-zinc-800 flex-shrink-0">
                        <div class="ml-3 flex flex-col justify-center leading-tight">
                            <span class="text-[11px] font-bold text-white">${secilenAlt.name}</span>
                            <span class="text-[9px] text-zinc-500 font-mono">Konum: Raf ${secilenAlt.shelf} (${secilenAlt.position})</span>
                        </div>
                    </div>
                </div>
            `;
            comboResult.classList.remove("hidden");
        });
    </script>
</body>
</html>
