<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Gardırop v3.0 - Visual Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-16">

    <header class="border-b border-zinc-800 sticky top-0 bg-zinc-950/80 backdrop-blur-md z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wider uppercase text-white">AKILLI GARDIROP</h1>
        <span class="text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full font-mono border border-emerald-500/20 animate-pulse">● Bulut Senkronize</span>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-8 space-y-8">
        
        <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-lg font-semibold mb-4 text-zinc-300 flex items-center gap-2">✨ Yeni Kıyafet Ekle</h2>
            <form id="clothingForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <input type="text" id="itemName" placeholder="Kıyafet Adı (Örn: Siyah Zara Tişört)" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-600 transition" required>
                
                <select id="itemCategory" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-600 transition" required>
                    <option value="">Kategori Seçin</option>
                    <option value="Üst Giyim">Üst Giyim</option>
                    <option value="Alt Giyim">Alt Giyim</option>
                    <option value="Dış Giyim">Dış Giyim</option>
                    <option value="Ayakkabı">Ayakkabı</option>
                </select>

                <input type="number" id="itemShelf" placeholder="Raf No (Örn: 3)" min="1" max="10" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-600 transition" required>

                <select id="itemPosition" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-600 transition" required>
                    <option value="">Konum Seçin</option>
                    <option value="Sol Taraf">Sol Taraf</option>
                    <option value="Sağ Taraf">Sağ Taraf</option>
                </select>

                <input type="url" id="itemImage" placeholder="Resim Linki (Boş bırakılırsa varsayılan gelir)" class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:outline-none focus:border-zinc-600 transition
